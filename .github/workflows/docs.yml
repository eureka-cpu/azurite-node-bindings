name: Docs
on:
  push:
    branches: [master]
permissions:
  contents: read
  pages: write
  id-token: write
# Only one deployment at a time; don't cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: actions/configure-pages@v5
      - name: Build docs
        run: nix build .#checks.x86_64-linux.docs --out-link docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
